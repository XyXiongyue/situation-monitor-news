                <p>伊朗外交部长阿巴斯·阿拉奇指责美国“公然违反”谅解备忘录（MoU）。</p>
                <p>他在一份声明中表示，美国的袭击、恢复对伊朗石油销售的制裁以及以色列与黎巴嫩真主党的持续冲突使“关于停止战争的谅解的重要和基本部分无效”。</p>
                <p>他补充说，伊朗“将毫不犹豫”捍卫其“完整、国家主权和国家安全”。</p>
                <p>阿拉奇在向拥有美国军事基地的海湾国家发出警告时表示，伊朗将“瞄准任何袭击的源头和起源点”。</p>
